<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود به سامانه | E-Taxation_System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <main class="auth-container">
    <section class="auth-card">
      <div class="auth-header">
        <div class="brand-icon center-icon">مالیات</div>
        <h1>ورود به سامانه مالیاتی</h1>
        <p>فرم ورود نمونه برای بخش ثبت نام الکترونیک و صدور شماره اقتصادی</p>
      </div>

      <form class="login-form">
        <div class="form-group">
          <label for="nationalCode">کد ملی / شناسه ملی</label>
          <input 
            type="text" 
            id="nationalCode" 
            placeholder="مثلاً 0012345678"
          >
        </div>

        <div class="form-group">
          <label for="password">رمز عبور</label>
          <input 
            type="password" 
            id="password" 
            placeholder="رمز عبور خود را وارد کنید"
          >
        </div>

        <button type="button" class="btn btn-primary full-width">
          ورود نمایشی
        </button>

        <p class="form-note">
          این فرم صرفاً نمایشی است و عملیات ورود واقعی انجام نمی‌دهد.
        </p>
      </form>

      <a href="index.html" class="back-link">بازگشت به صفحه اصلی</a>
    </section>
  </main>

</body>
</html>
